# Render Blueprint — free, always-on (with idle spin-down) hosting.
# Deploy: push this repo to a PRIVATE GitHub repo, then in Render create a new
# Blueprint from it and fill in the four secret env vars below.
services:
  - type: web
    name: stock-overview-512a6c65   # random, unlisted URL
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.2"
      # Set these in the Render dashboard (Environment) — not stored in git.
      - key: T212_API_KEY
        sync: false
      - key: T212_API_SECRET
        sync: false
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: DASHBOARD_SECRET       # signs the login cookie; keeps you logged in
        sync: false
